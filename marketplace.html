<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace - Campus Marketplace</title>
  <link rel="stylesheet" href="css/marketplace.css">

   
</head>
<body>
  <nav class="fisrtnav">
    <div ><strong>🛒Campus Market</strong></div>
    <ul>
      <li><a href="marketplace.html" class="active">Marketplace</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="#" onclick="logout()">Logout</a></li>
    </ul>
  </nav>

  <div class="hero">
    <h1>Find Items on Campus 🔍</h1>
    <div class="search-box">
      <input type="text" id="marketSearch" placeholder="Search laptops, books, phones..." onkeyup="searchMarketplace()">
      <button onclick="searchMarketplace()">Search</button>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filterMarket('All', this)">All</button>
    <button class="filter-btn" onclick="filterMarket('Phones', this)">📱 Phones</button>
    <button class="filter-btn" onclick="filterMarket('Electronics', this)">💻 Electronics</button>
    <button class="filter-btn" onclick="filterMarket('Books', this)">📚 Books</button>
    <button class="filter-btn" onclick="filterMarket('Fashion', this)">👕 Fashion</button>
    <button class="filter-btn" onclick="filterMarket('Hostel Items', this)">🪑 Hostel</button>
    <button class="filter-btn" onclick="filterMarket('Food', this)">🍔 Food</button>
    <button class="filter-btn" onclick="filterMarket('Services', this)">🛠 Services</button>
  </div>

  <div class="location-filter">
    <select id="marketLocation" onchange="applyMarketplaceFilters()">
      <option value="All">All Locations</option>
      <option>Unity Hall</option><option>Brunei</option><option>Ayeduase</option>
      <option>Kotei</option><option>Kentinkrono</option><option>Off Campus</option>
    </select>
    <select id="priceRange" onchange="applyMarketplaceFilters()">
      <option value="All">Any Price</option>
      <option value="0-100">₵0 - ₵100</option>
      <option value="100-500">₵100 - ₵500</option>
      <option value="500-1000">₵500 - ₵1,000</option>
      <option value="1000+">₵1,000+</option>
    </select>
  </div>
<!-- PRODUCT DETAILS MODAL -->
<div id="productModal" class="modal" style="display:none;">
  <div class="modal-content">
    <span class="close" onclick="closeProductModal()">&times;</span>
    <div id="productModalBody"></div>
  </div>
</div>
  <div class="container">
    <div class="product-grid" id="marketGrid"></div>
  </div>

  <script src="js/script.js"></script>
  <script>
    window.addEventListener('load', function() {
      checkAuth();
      loadMarketplace();
    });
  </script>
</body>
</html>
