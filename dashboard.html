<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Campus Marketplace</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <nav>
    <h2>CAMPUS MARKET</h2>
    <ul>
      <li><a href="marketplace.html">Marketplace</a></li>
      <li><a href="dashboard.html" class="active">Dashboard</a></li>
      <li><a href="#" onclick="logout()">Logout</a></li>
    </ul>
  </nav>

  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h2 id="welcomeUser">Hello! 👋</h2>
      <button class="btn-add" onclick="location.href='add-product.html'">+ Post New Item</button>
    </div>

    <div class="stats">
      <div class="stat-card"><h3 id="statActive">0</h3><p>Active</p></div>
      <div class="stat-card"><h3 id="statViews">0</h3><p>Views</p></div>
      <div class="stat-card"><h3 id="statSold">0</h3><p>Sold</p></div>
    </div>

    <div class="filters">
      <input type="text" id="dashSearch" placeholder="Search..." onkeyup="filterDashboard()">
      <select id="dashCategory" onchange="filterDashboard()">
        <option value="All">All Categories</option>
        <option>Phones</option><option>Electronics</option><option>Books</option>
        <option>Fashion</option><option>Hostel Items</option><option>Food</option><option>Services</option>
      </select>
      <select id="dashLocation" onchange="filterDashboard()">
        <option value="All">All Locations</option>
        <option>Unity Hall</option><option>Brunei</option><option>Ayeduase</option>
        <option>Kotei</option><option>Kentinkrono</option><option>Off Campus</option>
      </select>
    </div>

    <h3>My Products</h3>
    <div class="product-grid" id="productGrid"></div>
  </div>

  <!-- ONLY load script.js - it handles everything -->
  <script src="js/script.js"></script>
</body>
</html>
