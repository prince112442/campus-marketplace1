<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Marketplace</title>
 
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-container">
 
  <div class="auth-left login-bg" id="authLeft">
    <div class="auth-left-content">
      <h1 id="leftTitle">Hello, Welcome 👋</h1>
      <p id="leftSubtitle">To Capstone Project<br>Group 22</p>
     <a href="https://chat.whatsapp.com/IncsGV5izgnFkD2ddx4iUE" target="_blank">
  <button class="learn-more-btn">Learn More</button>
</a>
    </div>
  </div>

  <div class="auth-right" id="loginForm">
    <div class="auth-icon">
      <i class="fas fa-user"></i>
    </div>
    <h2>Campus Marketplace</h2>
    
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="loginEmail" placeholder="Email" required>
      </div>
      
      <div class="form-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="loginPassword" placeholder="Password" required>
      </div>
      
      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox">
          Remember me
        </label>
        <a href="#" class="forgot-password">Forgot password?</a>
      </div>
      
      <button type="submit" class="submit-btn">Login</button>
    </form>
    
    <div class="auth-switch">
      Don't have an account? <a onclick="showSignup()">Sign Up</a>
    </div>
  </div>


  <div class="auth-right hidden" id="signupForm">
    <div class="auth-icon">
      <i class="fas fa-user-plus"></i>
    </div>
    <h2>Create Account</h2>
    
    <form onsubmit="handleSignup(event)">
      <div class="form-group">
        <i class="fas fa-user"></i>
        <input type="text" id="signupName" placeholder="Full Name" required>
      </div>
      
      <div class="form-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="signupEmail" placeholder="Email" required>
      </div>
      
      <div class="form-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="signupPassword" placeholder="Password" required minlength="6">
      </div>
      
      <label class="terms-checkbox">
        <input type="checkbox" id="termsAgree" required>
        <span>I agree to <a href="#">Terms & Conditions</a></span>
      </label>
      
      <p id="signupError" class="error-message"></p>
      
      <button type="submit" class="submit-btn">Sign Up</button>
    </form>
    
    <div class="auth-switch">
      Already have an account? <a onclick="showLogin()">Login</a>
    </div>
  </div>
</div>

<script src="js/script.js"></script>
<script>
// toggle bt images 
function showSignup() {
  document.getElementById('loginForm').classList.add('hidden');
  document.getElementById('signupForm').classList.remove('hidden');
  
  // Change background image
  var leftPanel = document.getElementById('authLeft');
  leftPanel.classList.remove('login-bg');
  leftPanel.classList.add('signup-bg');
  
  // Change content
  document.getElementById('leftTitle').textContent = 'Join Us 👋';
  document.getElementById('leftSubtitle').innerHTML = 'Create your account<br>Group 22';
  document.querySelector('#signupForm .auth-icon i').className = 'fas fa-user-plus';
}

// Toggle to Login with different background image
function showLogin() {
  document.getElementById('signupForm').classList.add('hidden');
  document.getElementById('loginForm').classList.remove('hidden');
  
  // Change background image
  var leftPanel = document.getElementById('authLeft');
  leftPanel.classList.remove('signup-bg');
  leftPanel.classList.add('login-bg');
  
  // Change content
  document.getElementById('leftTitle').textContent = 'Hello, Welcome 👋';
  document.getElementById('leftSubtitle').innerHTML = 'To Capstone Project<br>Group 22';
  document.querySelector('#loginForm .auth-icon i').className = 'fas fa-sign-in-alt';
}

// This  Handle Login
function handleLogin(event) {
  event.preventDefault();
  
  var email = document.getElementById('loginEmail').value.trim();
  var password = document.getElementById('loginPassword').value.trim();
  
  if (!email || !password) {
    alert('Please fill in all fields');
    return;
  }
  
  if (login(email, password)) {
    window.location.href = 'dashboard.html';
  } else {
    alert('Invalid email or password');
  }
}

// Handle Signup
function handleSignup(event) {
  event.preventDefault();
  
  var name = document.getElementById('signupName').value.trim();
  var email = document.getElementById('signupEmail').value.trim();
  var password = document.getElementById('signupPassword').value.trim();
  var terms = document.getElementById('termsAgree').checked;
  
  if (!name || !email || !password) {
    alert('Please fill in all fields');
    return;
  }
  
  if (password.length < 6) {
    alert('Password must be at least 6 characters');
    return;
  }
  
  if (!terms) {
    alert('Please agree to Terms & Conditions');
    return;
  }
  
  if (signup(name, email, password)) {
    alert('Account created successfully! Please login.');
    showLogin();
  } else {
    var errorEl = document.getElementById('signupError');
    errorEl.textContent = 'Email already exists';
    errorEl.classList.add('show');
  }
}
</script>

</body>
</html>
